<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathSheety - 元角分换算口算练习纸</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav-tabs">
    <a href="index.html" class="nav-tab">口算练习</a>
    <a href="currency.html" class="nav-tab active">元角分换算</a>
  </nav>

  <header class="config-panel">
    <div class="header-title">
      <h1>MathSheety</h1>
      <p>元角分口算练习纸生成工具</p>
    </div>
    <div class="config-options">
      <div class="config-group">
        <span class="config-label">题型</span>
        <div class="radio-group">
          <label><input type="radio" name="op-type" value="mix" checked> 混合练习</label>
          <label><input type="radio" name="op-type" value="convert"> 单位换算</label>
          <label><input type="radio" name="op-type" value="arithmetic"> 币值计算</label>
          <label><input type="radio" name="op-type" value="exchange"> 等值兑换</label>
        </div>
      </div>
      <div class="config-group">
        <span class="config-label">最大元面额</span>
        <div class="radio-group">
          <label><input type="radio" name="max-yuan" value="10"> 10 元以内</label>
          <label><input type="radio" name="max-yuan" value="50"> 50 元以内</label>
          <label><input type="radio" name="max-yuan" value="100" checked> 100 元以内</label>
        </div>
      </div>
      <div class="config-group">
        <span class="config-label">范围设置</span>
        <div class="checkbox-group">
          <label><input type="checkbox" id="include-jiao" checked> 包含角 (1角/5角)</label>
          <label><input type="checkbox" id="include-fen" checked> 包含分 (1分)</label>
        </div>
      </div>
      <div class="config-group">
        <span class="config-label">题目数量</span>
        <select id="questions-count">
          <option value="20">20 题</option>
          <option value="30">30 题</option>
          <option value="40" selected>40 题</option>
        </select>
      </div>
    </div>
    <div class="actions-bar">
      <button id="btn-generate" class="btn btn-primary">生成练习纸</button>
      <button id="btn-toggle-answer" class="btn btn-secondary">显示答案</button>
      <button id="btn-print" class="btn btn-accent">打印练习纸</button>
    </div>
  </header>

  <main class="preview-area">
    <div class="sheet-container currency-sheet" id="sheet-container">
      <div class="sheet-header">
        <h2 id="sheet-title">元角分口算练习纸</h2>
        <div class="student-info">
          <span>姓名：___________</span>
          <span>日期：2026年__月__日</span>
          <span>用时：__分__秒</span>
          <span>成绩：_____/_____</span>
        </div>
      </div>
      <div class="sheet-grid col-2" id="sheet-grid">
        <!-- 题目由 JavaScript 动态生成并填充 -->
      </div>
      <div class="sheet-footer">
        <span>MathSheety 智能生成</span>
        <span>A4 规格标准排版 (210mm × 297mm)</span>
      </div>
    </div>
  </main>
  <script src="currency.js"></script>
</body>
</html>
